<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="stylesheet" href="css/style.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日とと記</title>
  <style>
    
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="日とと記 トップページ">
      <h1 class="logo" aria-label="日とと記">
        <span class="logo-main"><span class="ruby">ひ</span>日</span>
        <span class="logo-sub">と&nbsp;と</span>
        <span class="logo-main"><span class="ruby">き</span>記</span>
      </h1>

      <div class="wave-mark" aria-hidden="true">
        ≋<br />≋<br />≋
      </div>

      <p class="catch">
        日記を書く、<br />
        だれかの日記が届く。
      </p>

      <p class="lead">
        いいねもフォローもなく、<br />
        ただ書いて、ただ読むだけ。
      </p>

      <p class="quote">
        「しらないだれかも同じ今日を生きていた」<br />
        と、すこし実感するだけ。
      </p>

      <div class="actions">
        <button class="start-btn" popovertarget="modal" popovertarget="show" type="button">はじめる</button>
        <a class="sub-link" href="#">つかってたことがある</a>
      </div>

      <a class="more" href="#">もっとくわしく</a>
    </section>
  </main>

  <!-- モーダル（はじめるをクリックしたとき） -->
  <div id="modal" popover>
    <!-- <div class="modal-overlay"></div> -->
    <!-- <div class="modal-contents" role="dialog" aria-label="日とと記が安心できる場所であるために"> -->
      <button class="modal-close" popovertarget="modal" popovertarget="hide" type="button">×</button>
      <h2 class="modal-title">日とと記が安心できる場所であるために</h2>
      <!-- <button class="close-btn" type="button">閉じる</button> -->
    <!-- </div> -->
  </div>
</body>
</html>
